name: Sync Omie Data

on:
  schedule:
    - cron: '0 8 * * *'  # Todo dia às 5h BRT (8h UTC)
  workflow_dispatch:        # Permite rodar manualmente

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl cryptography

      - name: Run Omie Sync
        env:
          OMIE_APP_KEY: ${{ secrets.OMIE_APP_KEY }}
          OMIE_APP_SECRET: ${{ secrets.OMIE_APP_SECRET }}
          PYTHONUNBUFFERED: "1"
        run: python omie_sync.py

      - name: Extract Budget Data (BP)
        run: python extract_orcamento.py

      - name: Encrypt data files
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python encrypt_data.py

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dados_omie.enc dados_orcamento.enc
          git rm -f --ignore-unmatch dados_omie.json dados_omie.js dados_orcamento.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: atualiza dados criptografados $(date +'%d/%m/%Y %H:%M')"
            git pull --rebase origin main
            git push
          fi
