<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard RH Executivo — Studio Koti 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#090D16;--s1:#0F1420;--s2:#161C2E;--s3:#1E2640;--bdr:#252E45;--t1:#EAF0FA;--t2:#94A3BE;--t3:#5C6B85;--t4:#3D4A62;--blue:#4A90FF;--blue-d:rgba(74,144,255,.12);--green:#3DDC97;--green-d:rgba(61,220,151,.12);--red:#FF6B6B;--red-d:rgba(255,107,107,.12);--amber:#FFB547;--amber-d:rgba(255,181,71,.12);--purple:#A78BFA;--teal:#2DD4BF;--pink:#F472B6;--orange:#FB923C}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 36px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff}
.topbar h1{font-size:15px;font-weight:600}.topbar h1 span{color:var(--t3);font-weight:400;margin-left:6px}
.topbar-right{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:p 2s ease infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.main{max-width:1480px;margin:0 auto;padding:28px 36px 50px}
.legend-bar{display:flex;gap:20px;margin-bottom:20px;padding:10px 16px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;font-size:12px;color:var(--t2);align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-dot.real{background:var(--blue)}
.legend-dot.andamento{background:var(--amber);background:repeating-linear-gradient(45deg,var(--amber),var(--amber) 2px,rgba(255,181,71,.4) 2px,rgba(255,181,71,.4) 4px)}
.legend-dot.proj{background:var(--t4);border:1.5px dashed var(--t3)}
.alert{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--t2);line-height:1.55}
.alert-i{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.alert strong{color:var(--t1)}.alert .hl{color:var(--amber);font-weight:600}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--blue)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi:nth-child(1)::after{background:var(--blue)}.kpi:nth-child(2)::after{background:var(--green)}.kpi:nth-child(3)::after{background:var(--purple)}.kpi:nth-child(4)::after{background:var(--amber)}.kpi:nth-child(5)::after{background:var(--red)}.kpi:nth-child(6)::after{background:var(--teal)}.kpi:nth-child(7)::after{background:var(--pink)}.kpi:nth-child(8)::after{background:var(--orange)}
.kpi-l{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:8px}
.kpi-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;letter-spacing:-.5px;margin-bottom:5px}
.kpi-s{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.5}
.tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.tg{background:var(--green-d);color:var(--green)}.tr{background:var(--red-d);color:var(--red)}.tn{background:var(--amber-d);color:var(--amber)}.tb{background:var(--blue-d);color:var(--blue)}
.sec{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px;padding-bottom:6px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.sec::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--blue)}
.row{display:grid;gap:14px;margin-bottom:14px}.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:2fr 1fr}.r1{grid-template-columns:1fr}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:20px 22px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-t{font-size:13px;font-weight:600}
.bdg{font-size:10px;padding:3px 9px;border-radius:5px;font-weight:500;background:var(--blue-d);color:var(--blue)}.bdg-g{background:var(--green-d);color:var(--green)}
.cc{position:relative;width:100%}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--t4);border-bottom:1px solid var(--bdr);white-space:nowrap}
th:not(:first-child){text-align:right}
td{padding:8px 10px;border-bottom:1px solid rgba(37,46,69,.4);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px}
td:first-child{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--t1)}
td:not(:first-child){text-align:right}
tr:last-child td{border-bottom:none;font-weight:600;color:var(--t1)}
tr:hover td{background:rgba(74,144,255,.03)}
.bar-cell{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.bar-bg{width:70px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.proj-cell{color:var(--t4) !important;font-style:italic}
.ins{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:14px 18px;margin-top:14px;font-size:12px;color:var(--t2);line-height:1.65}
.ins strong{color:var(--t1)}.ins .hl{color:var(--amber);font-weight:600}
.foot{margin-top:36px;padding-top:16px;border-top:1px solid var(--bdr);font-size:11px;color:var(--t4);text-align:center}
.loading{display:flex;justify-content:center;align-items:center;min-height:60vh;color:var(--t3);font-size:14px}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.r2,.r3{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-grid{grid-template-columns:1fr}.main{padding:16px 12px}}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><div class="logo">SK</div><h1>Painel Executivo RH<span>— Studio Koti 2026</span></h1></div><div class="topbar-right"><div class="dot"></div><span id="topBase">Carregando...</span></div></div>
<div class="main" id="appMain">
  <div class="loading" id="loadingRH">Carregando dados RH...</div>
</div>

<script>
Chart.register(ChartDataLabels);
Chart.defaults.color='#5C6B85';
Chart.defaults.borderColor='rgba(37,46,69,.4)';
Chart.defaults.font.family="'DM Sans',sans-serif";
Chart.defaults.font.size=11;
Chart.defaults.plugins.legend.labels.usePointStyle=true;
Chart.defaults.plugins.legend.labels.pointStyleWidth=8;
Chart.defaults.plugins.legend.labels.padding=14;
Chart.defaults.plugins.datalabels.display=false;

var T={backgroundColor:'#161C2E',borderColor:'#252E45',borderWidth:1,padding:12};
var fK=function(v){return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'K':v>0?String(Math.round(v)):''};
var fKd=function(v){return v>=1000?(v/1000).toFixed(1)+'K':v>0?String(Math.round(v)):''};
var fBRL=function(v){return 'R$ '+(v>=1e6?(v/1e6).toFixed(2)+'M':v>=1000?Math.round(v/1000)+'K':Math.round(v))};
var df={family:"'JetBrains Mono',monospace",size:10,weight:'500'};
var dfs={family:"'JetBrains Mono',monospace",size:9,weight:'500'};
var M12=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var mNomes={1:'Jan',2:'Fev',3:'Mar',4:'Abr',5:'Mai',6:'Jun',7:'Jul',8:'Ago',9:'Set',10:'Out',11:'Nov',12:'Dez'};

// Stack total plugin
var STP={id:'stp',afterDatasetsDraw:function(ch){if(!ch.config.options._stp)return;var ctx=ch.ctx;ctx.save();ctx.font="500 10px 'JetBrains Mono',monospace";ctx.textAlign='center';ctx.fillStyle='#EAF0FA';var last=ch.getDatasetMeta(ch.data.datasets.length-1);last.data.forEach(function(bar,i){var t=0;ch.data.datasets.forEach(function(ds){t+=(ds.data[i]||0)});if(t>0)ctx.fillText(fK(Math.round(t)),bar.x,bar.y-8)});ctx.restore()}};

// Waterfall connectors
var wConn={id:'wfc',afterDatasetsDraw:function(ch){var m=ch.getDatasetMeta(0),ctx=ch.ctx;if(!m.data.length)return;ctx.save();ctx.setLineDash([4,3]);ctx.lineWidth=1.2;ctx.strokeStyle='rgba(148,163,190,.3)';for(var i=0;i<m.data.length-1;i++){var c=m.data[i],n=m.data[i+1];ctx.beginPath();ctx.moveTo(c.x+c.width/2,c.y);ctx.lineTo(n.x-n.width/2,c.y);ctx.stroke()}ctx.restore()}};
var wLbl={id:'wfl',afterDatasetsDraw:function(ch){var m=ch.getDatasetMeta(0),ctx=ch.ctx;if(!m.data.length||!ch.config.options._wfvals)return;ctx.save();ctx.textAlign='center';ctx.font="500 13px 'JetBrains Mono',monospace";var wV=ch.config.options._wfvals;m.data.forEach(function(b,i){var isT=i===0||i===m.data.length-1;ctx.fillStyle=isT?'#4A90FF':wV[i]>0?'#3DDC97':'#FF6B6B';ctx.fillText((wV[i]>0&&!isT?'+':'')+wV[i],b.x,b.y-8)});ctx.restore()}};

async function loadAndRender(){
  try{
    var resp=await fetch('rh_data.json');
    if(!resp.ok)throw new Error('rh_data.json não encontrado');
    var D=await resp.json();
    render(D);
  }catch(e){
    document.getElementById('loadingRH').innerHTML='<div style="text-align:center"><h2 style="color:var(--t2)">Dados RH não disponíveis</h2><p style="color:var(--t3);margin-top:8px">Rode: python extract_rh.py</p></div>';
  }
}

function render(D){
  var st=D.status_meses,meses=Object.keys(D.custo_mensal).sort();
  var mesRef=D.mes_referencia,mesRefN=parseInt(mesRef.split('-')[1]);
  var mesesReal=meses.filter(function(m){return st[m]==='realizado'});
  var mesesAnd=meses.filter(function(m){return st[m]==='andamento'});
  var mesesYTD=meses.filter(function(m){return st[m]==='realizado'||st[m]==='andamento'});
  var nReal=mesesReal.length;

  // Custo realizado (só meses fechados)
  var custoReal=mesesReal.reduce(function(s,m){return s+(D.custo_mensal[m].total||0)},0);
  var custoAnd=mesesAnd.reduce(function(s,m){return s+(D.custo_mensal[m].total||0)},0);
  var custoYTD=custoReal+custoAnd;
  var mediaReal=nReal?custoReal/nReal:0;
  var projAnual=mediaReal*12;
  var hcAtual=D.hc[mesRef]?D.hc[mesRef].final:0;
  var hcInicio=D.hc[mesesReal[0]]?D.hc[mesesReal[0]].inicio:0;
  var custoFunc=nReal&&hcAtual?custoReal/(hcAtual*nReal):0;

  // Turnover, rescisões, admissões
  var turnReal=mesesReal.reduce(function(s,m){return s+(D.hc[m].turnover||0)},0);
  var saidaVol=mesesYTD.reduce(function(s,m){return s+(D.hc[m].saida_vol||0)},0);
  var saidaInv=mesesYTD.reduce(function(s,m){return s+(D.hc[m].saida_inv||0)},0);
  var rescReal=mesesReal.reduce(function(s,m){return s+(D.custo_mensal[m].rescisao||0)},0);
  var admTotal=mesesYTD.reduce(function(s,m){return s+(D.hc[m].admissoes||0)},0);
  var varFevJan=nReal>=2?((D.custo_mensal[mesesReal[1]].total/D.custo_mensal[mesesReal[0]].total-1)*100):0;

  // Legenda dinâmica
  var realLabel=mesesReal.map(function(m){return mNomes[parseInt(m.split('-')[1])]}).join('–');
  var andLabel=mesesAnd.map(function(m){return mNomes[parseInt(m.split('-')[1])]}).join('');
  var projLabel=meses.filter(function(m){return st[m]==='projecao'}).map(function(m){return mNomes[parseInt(m.split('-')[1])]});
  var projLabelStr=projLabel.length?projLabel[0]+'–'+projLabel[projLabel.length-1]:'';

  document.getElementById('topBase').textContent='Base: '+mNomes[mesRefN]+'/2026';

  // Admissões por mês
  var admPorMes=mesesYTD.map(function(m){var n=parseInt(m.split('-')[1]);return mNomes[n]+': '+D.hc[m].admissoes});

  // Render HTML
  var html='';
  // Legend
  html+='<div class="legend-bar"><span style="font-weight:600;color:var(--t1);margin-right:4px">Legenda:</span>';
  html+='<div class="legend-item"><div class="legend-dot real"></div>Realizado ('+realLabel+')</div>';
  if(andLabel)html+='<div class="legend-item"><div class="legend-dot andamento"></div>Em andamento ('+andLabel+')</div>';
  html+='<div class="legend-item"><div class="legend-dot proj"></div>Projetado ('+projLabelStr+')</div></div>';

  // Alert
  html+='<div class="alert"><div class="alert-i" style="background:var(--amber-d);color:var(--amber)">!</div><div><strong>Atenção board:</strong> Apenas '+realLabel+' são dados fechados.'+
    (andLabel?' '+andLabel+' está em andamento.':'')+' De '+projLabel[0]+' em diante são projeções. <span class="hl">KPIs refletem apenas o realizado ('+nReal+' meses)</span> — projeção anual usa média realizada x 12.</div></div>';

  // KPIs row 1
  html+='<div class="kpi-grid">';
  html+='<div class="kpi"><div class="kpi-l">Desembolso Realizado</div><div class="kpi-v" style="color:var(--blue)">'+fBRL(custoReal)+'</div><div class="kpi-s">'+realLabel+' fechados <span class="tag tb">'+nReal+' meses</span></div></div>';
  html+='<div class="kpi"><div class="kpi-l">'+andLabel+' em Andamento</div><div class="kpi-v" style="color:var(--amber)">'+fBRL(custoAnd)+'</div><div class="kpi-s">Parcial — pode variar até fechamento</div></div>';
  html+='<div class="kpi"><div class="kpi-l">Projeção Anual</div><div class="kpi-v" style="color:var(--purple)">'+fBRL(projAnual)+'</div><div class="kpi-s">Média realizada x 12 <span class="tag tn">'+fBRL(mediaReal)+'/mês</span></div></div>';
  html+='<div class="kpi"><div class="kpi-l">Headcount Atual</div><div class="kpi-v" style="color:var(--green)">'+hcAtual+'</div><div class="kpi-s">'+mNomes[mesRefN]+'/26 · era '+hcInicio+' em Jan <span class="tag tg">+'+(hcAtual-hcInicio)+'</span></div></div>';
  html+='</div>';

  // KPIs row 2
  html+='<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">';
  html+='<div class="kpi"><div class="kpi-l">Custo/Func. (Realizado)</div><div class="kpi-v" style="color:var(--teal)">R$ '+Math.round(custoFunc).toLocaleString('pt-BR')+'</div><div class="kpi-s">Média '+realLabel+' <span class="tag '+(varFevJan>0?'tr':'tg')+'">'+
    (varFevJan>0?'+':'')+varFevJan.toFixed(1)+'% Fev vs Jan</span></div></div>';
  html+='<div class="kpi"><div class="kpi-l">Turnover Realizado</div><div class="kpi-v" style="color:var(--red)">'+(turnReal*100).toFixed(1)+'%</div><div class="kpi-s">'+(saidaVol+saidaInv)+' saídas em '+nReal+' meses ('+saidaVol+' vol + '+saidaInv+' inv)</div></div>';
  html+='<div class="kpi"><div class="kpi-l">Rescisões Realizadas</div><div class="kpi-v" style="color:var(--pink)">'+fBRL(rescReal)+'</div><div class="kpi-s">'+mesesReal.map(function(m){return mNomes[parseInt(m.split('-')[1])]+': '+fKd(D.custo_mensal[m].rescisao)}).join(' + ')+'</div></div>';
  html+='<div class="kpi"><div class="kpi-l">Admissões Realizadas</div><div class="kpi-v" style="color:var(--orange)">'+admTotal+'</div><div class="kpi-s">'+admPorMes.join(' · ')+'</div></div>';
  html+='</div>';

  // Charts section
  html+='<div class="sec">Visão Financeira — Evolução de Custos</div>';
  html+='<div class="row r3"><div class="card"><div class="card-h"><div class="card-t">Custo total mensal + custo per capita</div></div><div class="cc" style="height:310px"><canvas id="c1"></canvas></div><div class="ins" id="ins1"></div></div>';
  html+='<div class="card"><div class="card-h"><div class="card-t">Composição — onde vai o dinheiro</div><div class="bdg">YTD Real</div></div><div class="cc" style="height:310px"><canvas id="c2"></canvas></div></div></div>';

  html+='<div class="row r2"><div class="card"><div class="card-h"><div class="card-t">Desembolso mensal por natureza</div></div><div class="cc" style="height:300px"><canvas id="cFlux"></canvas></div></div>';
  html+='<div class="card"><div class="card-h"><div class="card-t">Rescisões & comissões — impacto caixa</div></div><div class="cc" style="height:300px"><canvas id="cResc"></canvas></div><div class="ins" id="insResc"></div></div></div>';

  html+='<div class="sec">Distribuição por Área</div>';
  html+='<div class="row r2"><div class="card"><div class="card-h"><div class="card-t">Custo mensal por área</div></div><div class="cc" style="height:340px"><canvas id="c3"></canvas></div></div>';
  html+='<div class="card"><div class="card-h"><div class="card-t">Ranking áreas — custo acumulado</div></div><div class="tw"><table><thead><tr><th>Área</th><th>HC</th><th>Acum.</th><th>Per Capita</th><th>%</th><th style="min-width:80px"></th></tr></thead><tbody id="tbl1"></tbody></table></div></div></div>';

  html+='<div class="row r2"><div class="card"><div class="card-h"><div class="card-t">Custo per capita por área ('+mNomes[mesRefN]+')</div></div><div class="cc" style="height:300px"><canvas id="cPC"></canvas></div><div class="ins" id="insPC"></div></div>';
  html+='<div class="card"><div class="card-h"><div class="card-t">HC por departamento — '+realLabel+(andLabel?' a '+andLabel:'')+'</div></div><div class="cc" style="height:300px"><canvas id="cHCd"></canvas></div><div class="ins" id="insHC"></div></div></div>';

  html+='<div class="sec">People Analytics</div>';
  html+='<div class="row r2"><div class="card"><div class="card-h"><div class="card-t">Headcount histórico — 2024 a 2026</div><div class="bdg bdg-g">3 anos</div></div><div class="cc" style="height:280px"><canvas id="c4"></canvas></div><div class="ins" id="insHist"></div></div>';
  html+='<div class="card"><div class="card-h"><div class="card-t">Ponte de headcount — Jan → '+mNomes[mesRefN]+'</div><div class="bdg">Waterfall</div></div><div class="cc" style="height:280px"><canvas id="cWF"></canvas></div></div></div>';

  html+='<div class="sec">Projeção & Cenários</div>';
  html+='<div class="row r1"><div class="card"><div class="card-h"><div class="card-t">Projeção anual — 3 cenários</div></div><div class="cc" style="height:310px"><canvas id="cProj"></canvas></div><div class="ins" id="insProj"></div></div></div>';

  // Fluxo de caixa table
  html+='<div class="row r1"><div class="card" style="padding:16px 22px"><div class="card-h" style="margin-bottom:10px"><div class="card-t">Fluxo de Caixa RH (R$ mil)</div></div><div class="tw"><table id="tblFluxo"></table></div></div></div>';

  // === ANALYTICS AVANÇADO ===
  html+='<div class="sec">Analytics Avançado</div>';

  // 11. Demográfico — KPIs + gráfico
  var demo=D.demografico[mesRef]||{};
  var idadeMedia=demo.idade_media||0;
  var tcMedio=demo.tempo_casa_medio||0;
  var idadePorArea=demo.idade_por_area||{};
  var tcPorArea=demo.tempo_casa_por_area||{};
  var demoAreas=Object.keys(idadePorArea).sort();

  html+='<div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:14px">';
  html+='<div class="kpi"><div class="kpi-l">Idade Média</div><div class="kpi-v" style="color:var(--blue)">'+idadeMedia.toFixed(1)+' anos</div><div class="kpi-s">Média da equipe em '+mNomes[mesRefN]+'/26</div></div>';
  html+='<div class="kpi"><div class="kpi-l">Tempo Médio de Casa</div><div class="kpi-v" style="color:var(--green)">'+tcMedio.toFixed(1)+' meses</div><div class="kpi-s">Média da equipe em '+mNomes[mesRefN]+'/26</div></div>';
  html+='</div>';

  html+='<div class="row r2">';

  var fcRubT=[['salarios','Salários'],['caju','Cartão Caju'],['inss_fgts','INSS / FGTS'],['estacionamento','Estacionamento'],['rescisao','Rescisão'],['comissao','Comissão']];
  var thd='<thead><tr><th>Rubrica</th>';
  meses.slice(0,6).forEach(function(m){var s=st[m];var col=s==='realizado'?'var(--blue)':s==='andamento'?'var(--amber)':'';
    thd+='<th'+(col?' style="color:'+col+'"':'')+'>'+(mNomes[parseInt(m.split('-')[1])])+(s==='realizado'?' ✓':s==='andamento'?' ~':'')+'</th>'});
  thd+='<th>Acum.</th></tr></thead>';
  var tbody='<tbody>';
  fcRubT.forEach(function(r){
    tbody+='<tr><td>'+r[1]+'</td>';
    var acum=0;
    meses.slice(0,6).forEach(function(m){
      var v=fc[m]?fc[m][r[0]]||0:D.custo_mensal[m][r[0]]||0;acum+=v;
      var s=st[m];var cls=s==='projecao'?' class="proj-cell"':'';var stl=s==='andamento'?' style="color:var(--amber)"':'';
      tbody+='<td'+cls+stl+'>'+(v>0?(v/1000).toFixed(1):'—')+'</td>';
    });
    tbody+='<td>'+(acum/1000).toFixed(1)+'</td></tr>';
  });
  // Total row
  tbody+='<tr><td>TOTAL</td>';
  var acumT=0;
  meses.slice(0,6).forEach(function(m){
    var v=fc[m]?fc[m].total||0:D.custo_mensal[m].total||0;acumT+=v;
    var s=st[m];var cls=s==='projecao'?' class="proj-cell"':'';var stl=s==='andamento'?' style="color:var(--amber)"':'';
    tbody+='<td'+cls+stl+'>'+(v/1000).toFixed(1)+'</td>';
  });
  tbody+='<td>'+(acumT/1000).toFixed(1)+'</td></tr></tbody>';
  fcTbl.innerHTML=thd+tbody;

  // === 11. DEMOGRÁFICO ===
  var demoA=Object.keys(idadePorArea).sort();
  new Chart(document.getElementById('cDemo'),{type:'bar',data:{
    labels:demoA,
    datasets:[
      {label:'Idade média (anos)',data:demoA.map(function(a){return idadePorArea[a]||0}),backgroundColor:'rgba(74,144,255,.6)',borderRadius:4},
      {label:'Tempo de casa (meses)',data:demoA.map(function(a){return tcPorArea[a]||0}),backgroundColor:'rgba(61,220,151,.6)',borderRadius:4}
    ]
  },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94A3BE',font:{size:10}}},tooltip:T,datalabels:{display:true,anchor:'end',align:'end',offset:2,font:dfs,color:'#EAF0FA',formatter:function(v){return Math.round(v)}}},
    scales:{x:{grid:{color:'rgba(37,46,69,.3)'}},y:{ticks:{color:'#94A3BE',font:{size:10}},grid:{display:false}}}}});

  var areaMaxTC=demoA.reduce(function(a,d){return(tcPorArea[d]||0)>(tcPorArea[a]||0)?d:a},demoA[0]);
  var areaMinIdade=demoA.reduce(function(a,d){return(idadePorArea[d]||99)<(idadePorArea[a]||99)?d:a},demoA[0]);
  document.getElementById('insDemo').innerHTML='<strong>People:</strong> <span class="hl">'+areaMaxTC+'</span> tem maior tempo de casa ('+Math.round(tcPorArea[areaMaxTC]||0)+' meses). '+areaMinIdade+' é a área mais jovem ('+Math.round(idadePorArea[areaMinIdade]||0)+' anos).';

  // === 12. FAIXA SALARIAL ===
  var fs=D.faixa_salarial||{};
  var fsCargos=Object.entries(fs).filter(function(e){return e[1].min>0}).sort(function(a,b){return b[1].media-a[1].media});
  var fsLabels=fsCargos.map(function(e){return e[0]+' ('+e[1].qtd+')'});
  var fsMin=fsCargos.map(function(e){return e[1].min});
  var fsMax=fsCargos.map(function(e){return e[1].max});
  var fsMedia=fsCargos.map(function(e){return e[1].media});
  var fsRange=fsCargos.map(function(e){return[e[1].min,e[1].max]});
  var mediaGeralSal=fsMedia.reduce(function(a,b){return a+b},0)/fsMedia.length;

  new Chart(document.getElementById('cFaixa'),{type:'bar',data:{
    labels:fsLabels,
    datasets:[
      {label:'Faixa (mín–máx)',data:fsRange,backgroundColor:'rgba(74,144,255,.35)',borderColor:'rgba(74,144,255,.6)',borderWidth:1,borderRadius:3,borderSkipped:false},
      {label:'Média',data:fsMedia,type:'line',borderColor:'#FFB547',pointBackgroundColor:'#FFB547',pointRadius:4,borderWidth:0,fill:false,
        datalabels:{display:true,anchor:'end',align:'right',offset:4,color:'#FFB547',font:dfs,formatter:function(v){return 'R$'+(v/1000).toFixed(1)+'K'}}}
    ]
  },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#94A3BE',font:{size:10}}},tooltip:T},
    scales:{x:{ticks:{callback:function(v){return 'R$'+fK(v)}},grid:{color:'rgba(37,46,69,.3)'}},y:{ticks:{color:'#94A3BE',font:{size:9}},grid:{display:false}}}}});

  var cargoMaiorFaixa=fsCargos.reduce(function(a,e){return(e[1].max-e[1].min)>(a[1].max-a[1].min)?e:a},fsCargos[0]);
  document.getElementById('insFaixa').innerHTML='<strong>RH:</strong> Maior faixa: <span class="hl">'+cargoMaiorFaixa[0]+'</span> (R$'+(cargoMaiorFaixa[1].min/1000).toFixed(1)+'K–R$'+(cargoMaiorFaixa[1].max/1000).toFixed(1)+'K). Média geral: R$'+(mediaGeralSal/1000).toFixed(1)+'K.';
}

loadAndRender();
</script>
</body>
</html>
